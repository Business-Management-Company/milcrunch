<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MilCrunch Prospectus Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-mil">Mil</span><span class="logo-crunch">Crunch</span>
      </div>
      <span class="badge" id="statusBadge">connecting</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggleEnabled" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Activity feed -->
  <div class="feed" id="feed">
    <div class="empty" id="emptyState">No activity yet. Waiting for prospectus visitors...</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="clearBtn">Clear History</button>
    <span class="count" id="countLabel">0 events</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
