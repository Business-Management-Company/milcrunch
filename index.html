<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let reg of registrations) { reg.unregister(); }
        });
        navigator.serviceWorker.register = () => Promise.resolve();
      }
    </script>
    <title>MilCrunch — For the Military & Veteran Community to Thrive</title>
    <meta name="description" content="MilCrunch is where the military and veteran community comes to be seen, heard, and understood. Creators, events, podcasts, and brands in one platform." />
    <meta name="author" content="MilCrunch" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MilCrunch">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script>
      (function() {
        try {
          var t = localStorage.getItem('parade-deck-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="MilCrunch — For the Military & Veteran Community to Thrive" />
    <meta property="og:description" content="MilCrunch is where the military and veteran community comes to be seen, heard, and understood. Creators, events, podcasts, and brands in one platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <meta property="og:site_name" content="MilCrunch" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MilCrunch" />
    <meta name="twitter:image" content="/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
